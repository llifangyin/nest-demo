apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-svc
  namespace: nest-demo
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 31672   # 浏览器访问管理界面：http://localhost:31672
  type: NodePort
