# 该文件目的是定义一个 ConfigMap 对象，存储 NestJS 应用的配置信息。
# ConfigMap 是 Kubernetes 中用于存储非敏感数据的对象，可以在 Pod 中以环境变量或文件的形式使用。
apiVersion: v1
kind: ConfigMap
metadata:
  name: nest-config
  namespace: nest-demo
data:
  PORT: "3000"
  REDIS_HOST: redis-svc
  REDIS_PORT: "6379"
  USER_SERVICE_HOST: user-service-svc
  PRODUCT_SERVICE_HOST: product-service-svc
  JWT_EXPIRES_IN: 1d
  TZ: Asia/Shanghai